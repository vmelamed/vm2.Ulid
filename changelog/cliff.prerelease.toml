[changelog]
header = """# Changelog\n\n"""
body = """
{% if tag is defined %}{% set current_tag = tag %}{% elif version is defined %}{% set current_tag = version %}{% else %}{% set current_tag = "Unreleased" %}{% endif -%}
{% if timestamp is defined %}{% set current_date = timestamp | date(format="%Y-%m-%d") %}{% else %}{% set current_date = now() | date(format="%Y-%m-%d") %}{% endif %}
{%- set grouped = commits | group_by(attribute="group") -%}
{%- if grouped | length > 0 %}
## {{ current_tag }} - {{ current_date }}
{% for group, commits in grouped %}
### {{ group }}
{% for commit in commits -%}
- {% if commit.breaking %}**BREAKING:** {% endif %}{{ commit.message | trim }}
{% endfor %}
{% endfor -%}
{% else %}
## {{ current_tag }} - {{ current_date }}

### Internal

DevOps changes only.
{% endif %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
tag_pattern = "v[0-9].*"
protect_breaking_commits = true
commit_parsers = [
    { message = "^style", group = "Internal" },
    { message = "^build", skip = true },
    { message = "^feat", group = "Added" },
    { message = "^test", group = "Internal" },
    { message = "^fix", group = "Fixed" },
    { message = "^refactor", group = "Internal" },
    { message = "^perf", group = "Performance" },
    { message = "^security", group = "Security" },
    { message = "^docs", group = "Internal" },
    { message = "^chore", group = "Internal" },
    { message = "^revert", group = "Removed" },
    { message = "^remove", group = "Removed" },
    { message = "^ci", skip = true },
    { message = "^devops", skip = true },
]
