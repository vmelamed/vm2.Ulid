name: "CI: Build, Test, Benchmark, Pack"

on:
  push:
    branches:
      - "**" # trigger on push for all branches

  pull_request:
    branches:
      - "**" # trigger on PR for all branches.

  workflow_dispatch:
    inputs:
      runners-os:
        description: Comma-separated runners OS-es
        type: string
        # Note: there is a known GitHub actions issue: the workflow dispatch UI doesn't properly handle JSON strings with quotes -
        # it removes the quotes. E.g. entering '["ubuntu-latest"]' in the UI prompt removes the inner quotes and it becomes the
        # invalid JSON: '[ubuntu-latest]'.
        default: ubuntu-latest

      preprocessor-symbols:
        description: Preprocessor symbols separated by semicolon, space, or comma. E.g. "ABC XYZ" or "ABC;XYZ" or "ABC,XYZ".
        type: string
        default: "SHORT_RUN"

      reset-benchmark-thresholds:
        description: Reset Bencher thresholds if degradation is expected.
        type: boolean
        default: false

# Concurrency: cancel in-progress runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  BUILD_PROJECTS: >-
    [
    "./vm2.Ulid.slnx"
    ]
  TEST_PROJECTS: >-
    [
    "test/UlidType.Tests/UlidType.Tests.csproj",
    "test/UlidTool.Tests/UlidTool.Tests.csproj"
    ]
  BENCHMARK_PROJECTS: >-
    [
    "benchmarks/UlidType.Benchmarks/UlidType.Benchmarks.csproj"
    ]
  PACKAGE_PROJECTS: >-
    [
    "src/UlidType/UlidType.csproj",
    "src/UlidTool/UlidTool.csproj"
    ]
  RUNNERS_OS: >-
    [
    "ubuntu-latest"
    ]
  PREPROCESSOR_SYMBOLS: ""
  DOTNET_VERSION: ${{ vars.DOTNET_VERSION || '10.0.x' }}
  CONFIGURATION: ${{ vars.CONFIGURATION || 'Release' }}
  MIN_COVERAGE_PCT: ${{ vars.MIN_COVERAGE_PCT || 80 }}
  MAX_REGRESSION_PCT: ${{ vars.MAX_REGRESSION_PCT || 20 }}
  MINVERTAGPREFIX: ${{ vars.MINVERTAGPREFIX || 'v' }}
  MINVERDEFAULTPRERELEASEIDENTIFIERS: ${{ vars.MINVERDEFAULTPRERELEASEIDENTIFIERS || 'preview.0' }}
  RESET_BENCHMARK_THRESHOLDS: ${{ vars.RESET_BENCHMARK_THRESHOLDS || 'false' }}
  VERBOSE: ${{ vars.VERBOSE || 'false' }}

jobs:
  prerun-ci:
    name: Prerun-CI
    runs-on: ubuntu-latest # in this workflow the runner doesn't matter - we're just preparing the inputs for the next workload(s).
    permissions:
      pull-requests: read
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    outputs:
      build-projects: ${{ steps.gather-params.outputs.build-projects }}
      test-projects: ${{ steps.gather-params.outputs.test-projects }}
      benchmark-projects: ${{ steps.gather-params.outputs.benchmark-projects }}
      package-projects: ${{ steps.gather-params.outputs.package-projects }}
      runners-os: ${{ steps.gather-params.outputs.runners-os }}
      dotnet-version: ${{ steps.gather-params.outputs.dotnet-version }}
      configuration: ${{ steps.gather-params.outputs.configuration }}
      preprocessor-symbols: ${{ steps.gather-params.outputs.preprocessor-symbols }}
      min-coverage-pct: ${{ steps.gather-params.outputs.min-coverage-pct }}
      max-regression-pct: ${{ steps.gather-params.outputs.max-regression-pct }}
      minver-tag-prefix: ${{ steps.gather-params.outputs.minver-tag-prefix }}
      minver-prerelease-id: ${{ steps.gather-params.outputs.minver-prerelease-id }}
      reset-benchmark-thresholds: ${{ steps.gather-params.outputs.reset-benchmark-thresholds }}
      skip-push: ${{ steps.gather-params.outputs.skip-push }}
    steps:
      - name: Gather CI inputs
        id: gather-params
        uses: vmelamed/vm2.DevOps/.github/actions/gather-inputs@main
        with:
          build-projects: ${{ env.BUILD_PROJECTS }}
          test-projects: ${{ env.TEST_PROJECTS }}
          benchmark-projects: ${{ env.BENCHMARK_PROJECTS }}
          package-projects: ${{ env.PACKAGE_PROJECTS }}
          runners-os: ${{ env.RUNNERS_OS }}
          preprocessor-symbols: ${{ env.PREPROCESSOR_SYMBOLS }}
          dispatch-runners-os: ${{ inputs.runners-os }}
          dispatch-preprocessor-symbols: ${{ inputs.preprocessor-symbols }}
          dispatch-reset-benchmark-thresholds: ${{ inputs.reset-benchmark-thresholds }}
          dotnet-version: ${{ env.DOTNET_VERSION }}
          configuration: ${{ env.CONFIGURATION }}
          min-coverage-pct: ${{ env.MIN_COVERAGE_PCT }}
          max-regression-pct: ${{ env.MAX_REGRESSION_PCT }}
          minver-tag-prefix: ${{ env.MINVERTAGPREFIX }}
          minver-prerelease-id: ${{ env.MINVERDEFAULTPRERELEASEIDENTIFIERS }}
          reset-benchmark-thresholds: ${{ env.RESET_BENCHMARK_THRESHOLDS }}
          verbose: ${{ env.VERBOSE }}

  run-ci:
    name: "Run CI"
    needs:
      - prerun-ci
    if: ${{ needs.prerun-ci.outputs.skip-push != 'true' }}
    uses: vmelamed/vm2.DevOps/.github/workflows/_ci.yaml@main
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
      REPORTGENERATOR_LICENSE: ${{ secrets.REPORTGENERATOR_LICENSE }}
    permissions:
      contents: read # Required to checkout the code
      packages: read # Required to restore GitHub Packages NuGet packages
      pull-requests: write # Required to comment on PRs
      checks: write # Required to create GitHub Checks
    with:
      build-projects: ${{ needs.prerun-ci.outputs.build-projects }}
      test-projects: ${{ needs.prerun-ci.outputs.test-projects }}
      benchmark-projects: ${{ needs.prerun-ci.outputs.benchmark-projects }}
      package-projects: ${{ needs.prerun-ci.outputs.package-projects }}
      runners-os: ${{ needs.prerun-ci.outputs.runners-os }}
      dotnet-version: ${{ needs.prerun-ci.outputs.dotnet-version }}
      configuration: ${{ needs.prerun-ci.outputs.configuration }}
      preprocessor-symbols: ${{ needs.prerun-ci.outputs.preprocessor-symbols }}
      min-coverage-pct: ${{ fromJSON(needs.prerun-ci.outputs.min-coverage-pct) }}
      max-regression-pct: ${{ fromJSON(needs.prerun-ci.outputs.max-regression-pct) }}
      minver-tag-prefix: ${{ needs.prerun-ci.outputs.minver-tag-prefix }}
      minver-prerelease-id: ${{ needs.prerun-ci.outputs.minver-prerelease-id }}
      reset-benchmark-thresholds: ${{ needs.prerun-ci.outputs.reset-benchmark-thresholds == 'true' }}

  # Gate job: single required status check for branch protection.
  # Replaces per-job required checks that break with reusable workflows + matrix (check names include
  # workflow prefix, matrix params, inner job names, and event suffixes that are impossible to predict).
  postrun-ci:
    name: Postrun-CI
    needs:
      - prerun-ci
      - run-ci
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Setup DevOps environment variables
        uses: vmelamed/vm2.DevOps/.github/actions/setup-env@main

      - name: Evaluate CI result
        shell: bash
        run: |
          {
              if [[ "${{ needs.prerun-ci.result }}" == "failure" || "${{ needs.prerun-ci.result }}" == "cancelled" ]]; then
                  echo "❌  ERROR: Arguments gathering and preparation failed"
                  exit 1
              fi
              if [[ "${{ needs.run-ci.result }}" == "skipped" ]]; then
                  echo "⚠️  WARNING: CI was skipped (push to non-main branch with open PR). Prerelease will not be triggered."
                  echo "              CI skipped (prerun-ci: ${{ needs.prerun-ci.result }}, run-ci: skipped)"
              elif [[ "${{ needs.run-ci.result }}" == "failure" || "${{ needs.run-ci.result }}" == "cancelled" ]]; then
                  echo "❌  ERROR: CI pipeline ${{ needs.run-ci.result }}"
                  exit 1
              else
                  echo "✅  INFO: CI completed (prerun-ci: ${{ needs.prerun-ci.result }}, run-ci: ${{ needs.run-ci.result }})"
              fi
          } >> "$GITHUB_STEP_SUMMARY"
